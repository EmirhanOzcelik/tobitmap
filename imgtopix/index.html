<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OLED Pixel Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="app">

  <aside id="sidebar">
    <div id="sidebar-header">
      <a href="../index.html" id="home-link" title="Ana Menüye Dön">
        <div class="home-mark">BS</div>
        <div class="home-label">
          <span class="home-name">BitPixHex</span>
          <span class="home-sub">← Ana Menü</span>
        </div>
      </a>
    </div>

    <div class="sidebar-scroll">

      <section class="panel-section">
        <div class="section-label">DOSYA</div>
        <button class="btn btn-primary" id="btn-load">📂 Resim Yükle</button>
        <input type="file" id="file-input" accept="image/*" hidden />
        <button class="btn btn-ghost" id="btn-crop-mode">✂️ Kırpma Modu</button>
        <button class="btn btn-ghost btn-danger" id="btn-reset">🔄 Sıfırla</button>
      </section>

      <section class="panel-section">
        <div class="section-label">ÇIKIŞ BOYUTU</div>
        <div class="dim-row">
          <label>G: <input type="number" id="out-w" value="128" min="1" max="256" class="dim-input" /></label>
          <label>Y: <input type="number" id="out-h" value="64" min="1" max="256" class="dim-input" /></label>
        </div>
        <label class="checkbox-row">
          <input type="checkbox" id="chk-proportional" checked />
          <span>Oransal ölçek</span>
        </label>
        <div class="preset-row">
          <span class="preset-label">Hazır:</span>
          <button class="btn-preset" data-w="128" data-h="64">128×64</button>
          <button class="btn-preset" data-w="128" data-h="32">128×32</button>
          <button class="btn-preset" data-w="64" data-h="48">64×48</button>
          <button class="btn-preset" data-w="32" data-h="32">32×32</button>
        </div>
        <button class="btn btn-accent" id="btn-apply">▶ Uygula</button>
      </section>

      <section class="panel-section">
        <div class="section-label">GÖRÜNTÜ AYARLARI</div>
        <div class="slider-group">
          <div class="slider-row">
            <span>Parlaklık</span>
            <input type="range" id="sl-brightness" min="0.1" max="3" step="0.05" value="1" />
            <span class="sl-val" id="val-brightness">1.00</span>
          </div>
          <div class="slider-row">
            <span>Kontrast</span>
            <input type="range" id="sl-contrast" min="0.1" max="3" step="0.05" value="1" />
            <span class="sl-val" id="val-contrast">1.00</span>
          </div>
          <div class="slider-row">
            <span>Keskinlik</span>
            <input type="range" id="sl-sharpness" min="0" max="10" step="0.1" value="0" />
            <span class="sl-val" id="val-sharpness">0.0</span>
          </div>
          <div class="slider-row">
            <span>Eşik (B/W)</span>
            <input type="range" id="sl-threshold" min="0" max="255" step="1" value="128" />
            <span class="sl-val" id="val-threshold">128</span>
          </div>
        </div>
      </section>

      <section class="panel-section">
        <div class="section-label">DÖNÜŞÜM</div>
        <label class="field-label">Dithering</label>
        <select id="sel-dither" class="select-input">
          <option value="floyd">Floyd-Steinberg</option>
          <option value="none">Yok (Eşik)</option>
          <option value="ordered">Ordered</option>
        </select>
        <label class="field-label">Yeniden Boyutlandırma</label>
        <select id="sel-filter" class="select-input">
          <option value="nearest">Nearest (Piksel)</option>
          <option value="bilinear">Bilinear</option>
          <option value="bicubic">Bicubic</option>
        </select>
        <label class="checkbox-row">
          <input type="checkbox" id="chk-invert" />
          <span>Renkleri Ters Çevir (OLED)</span>
        </label>
      </section>

      <section class="panel-section">
        <div class="section-label">ÇIKTI</div>
        <button class="btn btn-primary" id="btn-save-png">💾 PNG İndir</button>
        <button class="btn btn-ghost" id="btn-copy-c">📋 C Array Kopyala</button>
        <button class="btn btn-ghost" id="btn-copy-hex">🔢 Hex Array Kopyala</button>
      </section>

    </div>
  </aside>

  <main id="main-content">

    <div id="middle-panel">
      <div class="panel-title">KAYNAK RESİM</div>
      <div id="source-wrap">
        <canvas id="canvas-source"></canvas>
        <div id="crop-hint" class="hidden">Kırpma alanı seçin, ardından bırakın</div>
      </div>

      <div class="panel-title" style="margin-top:12px">GERÇEK BOYUT ÇIKTI</div>
      <div id="preview-wrap">
        <canvas id="canvas-preview"></canvas>
      </div>

      <div id="info-bar">—</div>
    </div>

    <div id="editor-panel">
      <div id="editor-topbar">
        <span class="panel-title" style="margin:0">PİKSEL DÜZENLEYİCİ</span>
        <span id="lbl-dim" class="dim-label">0×0 | 1×</span>
        <div class="topbar-controls">
          <label class="checkbox-row small">
            <input type="checkbox" id="chk-grid" checked />
            <span>Izgara</span>
          </label>
          <div class="zoom-ctrl">
            <button id="btn-zoom-out">−</button>
            <span id="lbl-zoom">1×</span>
            <button id="btn-zoom-in">+</button>
          </div>
          <button class="btn-icon" id="btn-undo" title="Geri Al (Ctrl+Z)">↩</button>
          <button class="btn-icon" id="btn-redo" title="İleri Al (Ctrl+Y)">↪</button>
        </div>
      </div>

      <div id="editor-body">
        <div id="canvas-editor-wrap">
          <canvas id="canvas-editor"></canvas>
        </div>

        <div id="tool-panel">
          <div class="tool-section-label">ARAÇLAR</div>
          <div class="tool-list" id="tool-list">
            <label class="tool-btn"><input type="radio" name="tool" value="pencil" checked /><span>✏️ Kalem</span></label>
            <label class="tool-btn"><input type="radio" name="tool" value="eraser" /><span>🧹 Silgi</span></label>
            <label class="tool-btn"><input type="radio" name="tool" value="fill" /><span>🪣 Doldur</span></label>
            <label class="tool-btn"><input type="radio" name="tool" value="rect_fill" /><span>⬛ Kare Doldur</span></label>
            <label class="tool-btn"><input type="radio" name="tool" value="rect_outline" /><span>⬜ Kare Çerçeve</span></label>
            <label class="tool-btn"><input type="radio" name="tool" value="line" /><span>➖ Çizgi</span></label>
            <label class="tool-btn"><input type="radio" name="tool" value="select" /><span>🔲 Alan Seç</span></label>
          </div>

          <div class="tool-section-label" style="margin-top:14px">RENK</div>
          <button id="btn-draw-color" class="color-btn draw-color-btn">
            <span class="color-swatch" id="swatch-draw"></span>Çiz
          </button>
          <button id="btn-erase-color" class="color-btn erase-color-btn">
            <span class="color-swatch" id="swatch-erase"></span>Sil
          </button>
          <button class="btn-small" id="btn-swap">⇄ Değiştir</button>
          <input type="color" id="picker-draw" hidden value="#000000" />
          <input type="color" id="picker-erase" hidden value="#ffffff" />

          <div class="tool-section-label" style="margin-top:14px">SEÇİM</div>
          <button class="btn-small" id="btn-fill-all">Tümünü Doldur</button>
          <button class="btn-small" id="btn-fill-sel">Seçimi Doldur</button>
          <button class="btn-small" id="btn-clear-sel">Seçimi Sil</button>
          <button class="btn-small" id="btn-deselect">Seçimi Temizle</button>

          <div class="tool-section-label" style="margin-top:14px">DÖNÜŞÜM</div>
          <button class="btn-small" id="btn-flip-h">↔ Yatay Çevir</button>
          <button class="btn-small" id="btn-flip-v">↕ Dikey Çevir</button>
          <button class="btn-small" id="btn-rotate-90">↻ 90° Döndür</button>
          <button class="btn-small" id="btn-invert-canvas">⬛ Tersine Çevir</button>

          <div class="tool-section-label" style="margin-top:14px">İMGE</div>
          <button class="btn-small" id="btn-mirror-paste">📷 Orijinalden Yapıştır</button>

          <div id="cursor-pos" class="cursor-pos">x:— y:—</div>
        </div>
      </div>
    </div>

  </main>
</div>

<div id="toast" class="toast hidden"></div>

<script src="js/core.js"></script>
<script src="js/editor.js"></script>
<script src="js/image.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
